name: Ingestion cotes (The Odds API)

# Étage 1 — capture les cotes 1X2 Premier League depuis The Odds API et committe
# les snapshots immuables dans data/raw/oddsapi/.
#
# Snapshots répétés le week-end = suivi de l'évolution des cotes (ouverture ->
# coup d'envoi), matière première du CLV. La déduplication évite les doublons
# quand les cotes n'ont pas bougé : pas de commit inutile, pas de crédit gaspillé
# côté stockage (le crédit API, lui, est dépensé à chaque appel — voir cadence).
#
# CLÉ API : fournie via le secret de repo ODDS_API_KEY (jamais en clair).
# Coût : 1 crédit par appel (marché h2h, région eu).

on:
  workflow_dispatch:        # manuel (tests, captures ponctuelles)
  schedule:
    # Le week-end, plusieurs fois par jour, pour suivre l'évolution des cotes.
    # Ven/Sam/Dim, à 10h, 14h, 18h UTC. ~12 appels/semaine = ~50/mois : large
    # sous le quota d'une seule clé (500/mois), marge énorme avec 5 clés.
    - cron: "0 10,14,18 * * 5,6,0"

permissions:
  contents: write

concurrency:
  group: ingest-odds
  cancel-in-progress: false

jobs:
  ingest-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capturer les cotes
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          PYTHONPATH=src python -m ingestion.oddsapi

      - name: Committer le snapshot (s'il y en a un nouveau)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data/raw/oddsapi
          git add data/raw/oddsapi/
          if git diff --staged --quiet; then
            echo "Aucun nouveau snapshot (cotes inchangées) — rien à committer."
          else
            git commit -m "data(raw): snapshot cotes Odds API $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
